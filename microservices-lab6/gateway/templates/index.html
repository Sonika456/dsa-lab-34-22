<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Микросервисы. Лабораторная работа №6</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .result pre {
            background: #2d3748;
            color: #68d391;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 13px;
        }
        
        .error {
            border-left-color: #e53e3e;
        }
        
        .error pre {
            color: #fc8181;
        }
        
        .success {
            border-left-color: #48bb78;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Микросервисная архитектура</h1>
        <div class="card">
            <h3>Добавить новую валюту</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="load_name">Название валюты (например, USD):</label>
                    <input type="text" id="load_name" placeholder="USD">
                </div>
                <div class="form-group">
                    <label for="load_rate">Курс к рублю:</label>
                    <input type="number" id="load_rate" step="0.01" placeholder="92.50">
                </div>
            </div>
            <button onclick="loadCurrency()">Добавить валюту</button>
            <div id="load_result" class="result" style="display: none;"></div>
        </div>
        
        <div class="card">
            <h3>Обновить курс валюты</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="update_name">Название валюты:</label>
                    <input type="text" id="update_name" placeholder="USD">
                </div>
                <div class="form-group">
                    <label for="update_rate">Новый курс:</label>
                    <input type="number" id="update_rate" step="0.01" placeholder="93.00">
                </div>
            </div>
            <button onclick="updateCurrency()">Обновить курс</button>
            <div id="update_result" class="result" style="display: none;"></div>
        </div>
        
        <div class="card">
            <h3>Удалить валюту</h3>
            <div class="form-group">
                <label for="delete_name">Название валюты:</label>
                <input type="text" id="delete_name" placeholder="USD">
            </div>
            <button onclick="deleteCurrency()">Удалить</button>
            <div id="delete_result" class="result" style="display: none;"></div>
        </div>
        
        <div class="card">
            <h3>Конвертация валюты</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="conv_currency">Валюта:</label>
                    <input type="text" id="conv_currency" placeholder="USD">
                </div>
                <div class="form-group">
                    <label for="conv_amount">Сумма:</label>
                    <input type="number" id="conv_amount" step="0.01" placeholder="100">
                </div>
            </div>
            <button onclick="convertCurrency()">Конвертировать</button>
            <div id="convert_result" class="result" style="display: none;"></div>
        </div>
        
        <div class="card">
            <h3>Список всех валют</h3>
            <button onclick="getCurrencies()">Получить список</button>
            <div id="currencies_result"></div>
        </div>
    </div>
    
    <script>
        const api = async (method, url, bodyData, elementId) => {
            const response = await fetch(url, {
                method: method,
                body: bodyData ? JSON.stringify(bodyData) : null,
                headers: bodyData ? { 'Content-Type': 'application/json' } : {}
            });
            const data = await response.json();
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'result ' + (response.ok ? 'success' : 'error');

            // Проверка: если это запрос списка валют
            if (response.ok && url === '/currencies' && Array.isArray(data)) {
                if (data.length) {
                    element.innerHTML = `
                        <table>
                            <tr>
                                <th>ID</th>
                                <th>Валюта</th>
                                <th>Курс</th>
                            </tr>
                            ${data.map(currency => `
                                <tr>
                                    <td>${currency.id}</td>
                                    <td>${currency.currency_name}</td>
                                    <td>${currency.rate.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </table>
                    `;
                } else {
                    element.innerHTML = 'Пусто';
                }
            } else {
                element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }

            // Очистка полей после загрузки валюты
            if (url === '/load') {
                load_name.value = '';
                load_rate.value = '';
            }
        };
        const loadCurrency = () => api('POST', '/load', 
            { currency_name: load_name.value, rate: +load_rate.value }, 
            'load_result'
        );
        const updateCurrency = () => api('POST', '/update_currency', 
            { currency_name: update_name.value, rate: +update_rate.value }, 
            'update_result'
        );
        const deleteCurrency = () => api('POST', '/delete', 
            { currency_name: delete_name.value }, 
            'delete_result'
        );
        const convertCurrency = () => api('GET', 
            `/convert?currency=${conv_currency.value}&amount=${conv_amount.value}`, 
            null, 
            'convert_result'
        );
        const getCurrencies = () => api('GET', '/currencies', null, 'currencies_result');
    </script>
</body>
</html>
